    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .cyber-grid {
        background-image: radial-gradient(circle at 2px 2px, rgba(153, 69, 255, 0.05) 1px, transparent 0);
        background-size: 40px 40px;
      }
      .glass-panel {
        backdrop-filter: blur(24px);
        background: rgba(19, 19, 19, 0.4);
      }
      .terminal-grid {
        background-image: radial-gradient(circle, #ffffff05 1px, transparent 1px);
        background-size: 30px 30px;
      }
      .cyber-glass {
        background: rgba(19, 19, 19, 0.6);
        backdrop-filter: blur(16px);
      }
      .text-glow-primary { text-shadow: 0 0 10px rgba(153, 69, 255, 0.5); }
      .text-glow-secondary { text-shadow: 0 0 10px rgba(0, 236, 145, 0.5); }
      .cyber-glow-primary { box-shadow: 0 0 20px rgba(153, 69, 255, 0.15); }
      .cyber-glow-secondary { box-shadow: 0 0 20px rgba(0, 236, 145, 0.15); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      body { background-color: #131313; color: #e5e2e1; }
      #root { min-height: 100dvh; }

      /* Desaturate filter for forge images */
      .reveal-image {
        filter: grayscale(100%) brightness(0.6);
        transition: filter 0.7s cubic-bezier(0.22, 1, 0.36, 1), transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .group:hover .reveal-image {
        filter: grayscale(0%) brightness(1);
        opacity: 1 !important;
      }
    </style>
